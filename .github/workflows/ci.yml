name: CI

on:
  push:
    branches: [main, chore/initial-setup]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn
      
      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc --noEmit

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test:run

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Build
        run: yarn build

      - name: Run E2E tests
        run: yarn test:e2e

